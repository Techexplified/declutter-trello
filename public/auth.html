<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
  </head>
  <body>
    <script>
      const token = new URLSearchParams(window.location.hash.substring(1)).get(
        "token",
      );

      if (token) {
        TrelloPowerUp.authorize(token);
      }
    </script>
  </body>
</html>
