<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unassigned Cards – Declutter</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050a11;
        color: #e2e8f0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        box-sizing: border-box;
      }
      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* ── Scrollbar ── */
      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #ffffff22;
        border-radius: 999px;
      }

      /* ── Table ── */
      table {
        border-collapse: collapse;
        width: 100%;
      }
      thead th {
        position: sticky;
        top: 0;
        background: #070e1a;
        z-index: 1;
      }

      /* ── Checkbox ── */
      input[type="checkbox"] {
        accent-color: #a855f7;
        width: 16px;
        height: 16px;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* ── Row hover ── */
      tbody tr {
        transition: background 0.12s;
      }
      tbody tr:hover {
        background: #0f1c2e;
      }

      /* ── Due-date badge colours ── */
      .due-high {
        color: #f97316;
      }
      .due-medium {
        color: #f59e0b;
      }
      .due-low {
        color: #94a3b8;
      }

      /* ── Assign button pulse ── */
      @keyframes assign-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 #a855f740;
        }
        50% {
          box-shadow: 0 0 0 6px #a855f700;
        }
      }
      .assign-btn {
        animation: assign-pulse 2.2s ease-in-out infinite;
      }

      /* ── Spinner ── */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spin {
        animation: spin 0.8s linear infinite;
      }

      /* ── Avatar colours (cycled by index) ── */
      .av-0 {
        background: #3b82f6;
      }
      .av-1 {
        background: #8b5cf6;
      }
      .av-2 {
        background: #10b981;
      }
      .av-3 {
        background: #f59e0b;
      }
      .av-4 {
        background: #ef4444;
      }
      .av-5 {
        background: #ec4899;
      }
      .av-6 {
        background: #06b6d4;
      }
      .av-7 {
        background: #84cc16;
      }

      /* ── More-actions dropdown ── */
      #more-actions-menu {
        display: none;
        position: absolute;
        right: 0;
        bottom: calc(100% + 4px);
        z-index: 50;
        min-width: 160px;
        background: #0f1724;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 4px 0;
        box-shadow: 0 8px 24px #000a;
      }
      #more-actions-menu.open {
        display: block;
      }
      #more-actions-menu button {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 7px 14px;
        font-size: 13px;
        color: #cbd5e1;
        background: transparent;
        border: none;
        cursor: pointer;
        text-align: left;
      }
      #more-actions-menu button:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
      }

      /* ── Pagination button ── */
      .pg-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
        font-size: 13px;
        transition:
          background 0.12s,
          color 0.12s;
      }
      .pg-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
      }
      .pg-btn.active {
        background: #a855f722;
        border-color: #a855f780;
        color: #a855f7;
        font-weight: 700;
      }
      .pg-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      /* ── Member-picker popover ── */
      .member-popover {
        position: fixed;
        z-index: 100;
        width: 240px;
        max-height: 320px;
        display: flex;
        flex-direction: column;
        background: #0f1724;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        box-shadow: 0 12px 32px #000c;
        overflow: hidden;
      }
      .member-popover-header {
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 600;
        color: #cbd5e1;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
      }
      .member-popover-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }
      .member-popover-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        cursor: pointer;
        font-size: 13px;
        color: #e2e8f0;
      }
      .member-popover-item:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .member-popover-item input[type="checkbox"] {
        accent-color: #a855f7;
        width: 14px;
        height: 14px;
        margin: 0;
      }
      .member-popover-empty {
        padding: 14px 12px;
        font-size: 12px;
        color: #64748b;
        text-align: center;
      }
      .member-popover-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
      }
      .member-popover-done {
        background: #a855f7;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .member-popover-done:hover {
        background: #9333ea;
      }
      .member-popover-done:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .member-popover-cancel {
        background: transparent;
        color: #94a3b8;
        border: none;
        font-size: 12px;
        cursor: pointer;
        padding: 6px 8px;
      }
      .member-popover-cancel:hover {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="./unassigned-cards.js"></script>
  </body>
</html>
