<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      // DO NOT call TrelloPowerUp.iframe() here — that's only for popup pages.
      // The connector only calls TrelloPowerUp.initialize().

      var BASE_URL = "https://declutter-trello.vercel.app";

      function getDeclutterModalHeight() {
        var availableHeight =
          (window.screen && window.screen.availHeight) ||
          window.innerHeight ||
          680;
        return Math.max(420, Math.min(620, availableHeight - 220));
      }

      TrelloPowerUp.initialize(
        {
          "board-buttons": function (t, options) {
            return [
              {
                icon: {
                  dark: BASE_URL + "/images/icon-dark.svg",
                  light: BASE_URL + "/images/icon-light.svg",
                },
                text: "Declutter",
                condition: "always",
                callback: function (t) {
                  var height = getDeclutterModalHeight();
                  if (typeof t.modal === "function") {
                    return t.modal({
                      title: "Declutter \u2013 Stale Card Manager",
                      url: BASE_URL + "/popup.html",
                      height: height,
                      fullscreen: false,
                    });
                  }
                  return t.popup({
                    title: "Declutter \u2013 Stale Card Manager",
                    url: BASE_URL + "/popup.html",
                    height: height,
                  });
                },
              },
            ];
          },

          "authorization-status": function (t, options) {
            return t.get("member", "private", "token").then(function (token) {
              return { authorized: !!token };
            });
          },

          "show-authorization": function (t, options) {
            return t
              .authorize(
                `https://trello.com/1/authorize?expiration=never&name=Declutter&scope=read,write&response_type=token&key=2082693e62994dce1c1cba5f43e4711b&return_url=${encodeURIComponent(
                  window.location.origin + "/auth.html",
                )}`,
                {
                  height: 680,
                  width: 580,
                  validToken: (token) => token && token.length > 0,
                },
              )
              .then(function (token) {
                return t.set("member", "private", "token", token);
              });
          },
        },
        {
          appKey: "2082693e62994dce1c1cba5f43e4711b",
          appName: "Declutter",
        },
      );
    </script>
  </head>
  <body></body>
</html>
