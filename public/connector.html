<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
      // DO NOT call TrelloPowerUp.iframe() here — that's only for popup pages.
      // The connector only calls TrelloPowerUp.initialize().

      var BASE_URL = "https://declutter-trello.vercel.app";

      TrelloPowerUp.initialize({
        "board-buttons": function (t, options) {
          return [
            {
              icon: {
                dark: BASE_URL + "/images/icon-dark.svg",
                light: BASE_URL + "/images/icon-light.svg",
              },
              text: "Declutter",
              condition: "always",
              callback: function (t) {
                return t.popup({
                  title: "Declutter \u2013 Stale Card Manager",
                  url: BASE_URL + "/popup.html",
                  height: 680,
                  width: 700,
                });
              },
            },
          ];
        },
      });
    </script>
  </head>
  <body></body>
</html>
