<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stale Cards – Declutter</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050a11;
        color: #e2e8f0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        box-sizing: border-box;
      }
      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* ── Scrollbar ── */
      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #ffffff22;
        border-radius: 999px;
      }

      /* ── Table ── */
      table {
        border-collapse: collapse;
        width: 100%;
      }
      thead th {
        position: sticky;
        top: 0;
        background: #070e1a;
        z-index: 1;
      }

      /* ── Checkbox style ── */
      input[type="checkbox"] {
        accent-color: #ef4444;
        width: 16px;
        height: 16px;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* ── Row hover ── */
      tbody tr {
        transition: background 0.12s;
      }
      tbody tr:hover {
        background: #0f1c2e;
      }

      /* ── Days badge colours ── */
      .days-critical {
        color: #ef4444;
      }
      .days-high {
        color: #f97316;
      }
      .days-medium {
        color: #facc15;
      }

      /* ── Sweep button pulse ── */
      @keyframes sweep-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 #ef444440;
        }
        50% {
          box-shadow: 0 0 0 6px #ef444400;
        }
      }
      .sweep-btn {
        animation: sweep-pulse 2.2s ease-in-out infinite;
      }

      /* ── Spinner ── */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spin {
        animation: spin 0.8s linear infinite;
      }

      /* ── Bottom action bar ── */
      #action-bar {
        transition: opacity 0.2s ease;
      }

      #action-bar.hidden-bar {
        display: none;
      }

      #action-bar:not(.hidden-bar) {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- content injected by JS -->
    </div>

    <script type="module" src="./stale-cards.js"></script>
  </body>
</html>
