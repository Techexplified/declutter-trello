<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Declutter</title>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        background: #050a11;
        color: #e2e8f0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      #root {
        width: 100%;
      }

      .declutter-shell {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
      }

      .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #ffffff22;
        border-radius: 999px;
      }

      @media (max-width: 640px) {
        .health-grid,
        .stats-grid,
        .rules-grid,
        .summary-grid,
        .quick-grid {
          grid-template-columns: minmax(0, 1fr) !important;
        }

        .aging-flex {
          flex-direction: column;
          align-items: stretch;
        }

        .rule-section {
          border-right: 0 !important;
          border-bottom: 1px solid rgb(255 255 255 / 0.1);
          padding: 0 0 16px 0 !important;
        }

        .rule-section + .rule-section {
          padding-top: 16px !important;
        }

        .rule-section:last-child {
          border-bottom: 0;
          padding-bottom: 0 !important;
        }

        .summary-item {
          border-right: 0 !important;
          border-bottom: 1px solid rgb(255 255 255 / 0.1);
          padding: 14px 0;
        }

        .summary-item:last-child {
          border-bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      const t = TrelloPowerUp.iframe();
      const TRELLO_APP_KEY = "2082693e62994dce1c1cba5f43e4711b";

      function getToken() {
        return t.get("member", "private", "token");
      }

      function saveToken(token) {
        return t.set("member", "private", "token", token);
      }

      function authorizeWithTrello() {
        return t
          .authorize(
            `https://trello.com/1/authorize?expiration=never&name=Declutter&scope=read,write&response_type=token&key=${TRELLO_APP_KEY}&return_url=${encodeURIComponent(
              `${window.location.origin}/auth.html`,
            )}`,
            {
              height: 680,
              width: 580,
              validToken: (token) => token && token.length > 0,
            },
          )
          .then((token) => saveToken(token).then(() => token));
      }

      function trelloFetch(path, token) {
        const sep = path.includes("?") ? "&" : "?";
        return fetch(
          `https://api.trello.com/1${path}${sep}key=${TRELLO_APP_KEY}&token=${token}`,
        ).then((r) => r.json());
      }

      function daysSince(dateStr) {
        return Math.floor(
          (Date.now() - new Date(dateStr).getTime()) / 86_400_000,
        );
      }

      function computeHealth(cards) {
        if (!cards.length) return 100;
        const stale = cards.filter((c) => daysSince(c.dateLastActivity) >= 30);
        const atRisk = cards.filter((c) => {
          const d = daysSince(c.dateLastActivity);
          return d >= 21 && d < 30;
        });
        return Math.max(0, Math.round(100 - stale.length * 4 - atRisk.length * 1.5));
      }

      function demoCards() {
        return Array.from({ length: 245 }, (_, i) => ({
          id: String(i),
          name: `Card ${i}`,
          dateLastActivity: new Date(Date.now() - (i % 50) * 86_400_000).toISOString(),
          idMembers: i % 35 < 7 ? [] : ["member1"],
        }));
      }

      function circle(value, color, size = 104, stroke = 10) {
        const r = (size - stroke) / 2;
        const circ = 2 * Math.PI * r;
        return `
          <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="-rotate-90">
            <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="#ffffff12" stroke-width="${stroke}"></circle>
            <circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${circ - (value / 100) * circ}" stroke-linecap="round"></circle>
          </svg>`;
      }

      function icon(name, size = 16, className = "") {
        const attrs = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"`;
        const paths = {
          brush: '<path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 0 1 4.03 4.03L13.1 15.94"></path><path d="M7.07 14A3.99 3.99 0 0 0 3 18c0 1 0 3-2 3 0 0 4 0 6-2a3.99 3.99 0 0 0 .07-5Z"></path>',
          refresh: '<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 16h5v5"></path>',
          x: '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>',
          check: '<path d="M9 12l2 2 4-4"></path><circle cx="12" cy="12" r="10"></circle>',
          alert: '<path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"></path>',
          circleAlert: '<circle cx="12" cy="12" r="10"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path>',
          user: '<path d="M18 20a6 6 0 0 0-12 0"></path><circle cx="12" cy="10" r="4"></circle>',
          arrow: '<path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path>',
          info: '<circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path>',
          spark: '<path d="M12 3l1.6 5.2L19 10l-5.4 1.8L12 17l-1.6-5.2L5 10l5.4-1.8L12 3Z"></path><path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15Z"></path>',
          help: '<circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 1 1 5.82 1c0 2-3 2-3 4"></path><path d="M12 17h.01"></path>',
          chart: '<path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path>',
          clock: '<circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path>',
          rotate: '<path d="M21 12a9 9 0 1 1-2.64-6.36"></path><path d="M21 3v6h-6"></path>',
        };
        return `<svg ${attrs}>${paths[name] || ""}</svg>`;
      }

      function statCard({ iconName, label, count, sub, color }) {
        return `
          <div class="rounded-lg border border-white/10 bg-[#0f1724] p-4">
            <div class="flex items-center gap-2 text-sm font-medium text-white">
              <span class="flex h-6 w-6 items-center justify-center rounded-full" style="background:${color}22;color:${color}">${icon(iconName, 17)}</span>
              ${label}
            </div>
            <div class="mt-2 text-3xl font-bold leading-none" style="color:${color}">${count}</div>
            <div class="mt-1 text-xs text-slate-300">${sub}</div>
            <button class="mt-3 flex h-7 w-full items-center justify-center gap-2 rounded-md border bg-transparent text-xs font-medium hover:bg-white/5" style="border-color:${color}80;color:${color}">
              View All ${icon("arrow", 13)}
            </button>
          </div>`;
      }

      function ageBar(label, color, count, max) {
        return `
          <div class="grid grid-cols-[150px_1fr_38px] items-center gap-3">
            <div class="flex items-center gap-2 text-sm text-slate-300"><span class="h-3 w-3 rounded-full" style="background:${color}"></span>${label}</div>
            <div class="h-2.5 overflow-hidden rounded-full bg-white/10"><div class="h-full rounded-full" style="background:${color};width:${Math.min(100, (count / max) * 100)}%"></div></div>
            <div class="text-right text-sm tabular-nums text-slate-300">${count}</div>
          </div>`;
      }

      function donut(fresh, aging, atRisk, stale, total) {
        const segments = [
          [fresh, "#22c55e"],
          [aging, "#facc15"],
          [atRisk, "#f97316"],
          [stale, "#ef4444"],
        ];
        let offset = 25;
        const rings = segments
          .map(([value, color]) => {
            const dash = total ? (value / total) * 100 : 0;
            const ring = `<circle cx="21" cy="21" r="15.915" fill="transparent" stroke="${color}" stroke-width="7" stroke-dasharray="${dash} ${100 - dash}" stroke-dashoffset="${offset}"></circle>`;
            offset -= dash;
            return ring;
          })
          .join("");
        return `
          <div class="relative h-28 w-28 shrink-0">
            <svg class="-rotate-90" viewBox="0 0 42 42">
              <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#ffffff10" stroke-width="7"></circle>
              ${rings}
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <span class="text-2xl font-bold leading-none text-white">${total}</span>
              <span class="text-[11px] text-slate-300">Total Cards</span>
            </div>
          </div>`;
      }

      function renderSignIn(root, onAuth) {
        root.innerHTML = `
          <div class="flex min-h-[420px] flex-col items-center justify-center px-8 text-center">
            <div class="mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/25">${icon("brush", 34)}</div>
            <h1 class="text-2xl font-bold text-white">Welcome to Declutter</h1>
            <p class="mt-2 max-w-md text-sm text-slate-400">Keep your Trello boards clean and healthy. Detect stale cards, track board health, and sweep old cards automatically.</p>
            <button id="signin" class="mt-6 rounded-lg bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-500">Sign in with Trello</button>
          </div>`;
        document.getElementById("signin").addEventListener("click", async () => {
          const token = await authorizeWithTrello();
          onAuth(token);
        });
      }

      async function renderDashboard(root, token) {
        root.innerHTML = '<div class="flex h-[680px] items-center justify-center"><div class="h-9 w-9 animate-spin rounded-full border-2 border-blue-500/30 border-t-blue-500"></div></div>';

        let cards = demoCards();
        try {
          if (token) {
            const boards = await trelloFetch("/members/me/boards?filter=open&fields=id", token);
            const arrays = await Promise.all(
              boards.slice(0, 5).map((b) =>
                trelloFetch(`/boards/${b.id}/cards/open?fields=id,name,dateLastActivity,idMembers`, token),
              ),
            );
            cards = arrays.flat();
          }
        } catch (e) {
          console.error(e);
        }

        const threshold = 30;
        const stale = cards.filter((c) => daysSince(c.dateLastActivity) >= threshold);
        const atRisk = cards.filter((c) => {
          const d = daysSince(c.dateLastActivity);
          return d >= 21 && d < threshold;
        });
        const unassigned = cards.filter((c) => !c.idMembers?.length);
        const fresh = cards.filter((c) => daysSince(c.dateLastActivity) <= 7);
        const aging = cards.filter((c) => {
          const d = daysSince(c.dateLastActivity);
          return d >= 8 && d <= 20;
        });
        const health = computeHealth(cards);
        const healthColor = health >= 80 ? "#22c55e" : health >= 60 ? "#facc15" : "#ef4444";
        const healthLabel = health >= 80 ? "Your board is in good health" : health >= 60 ? "Your board needs attention" : "Your board needs cleanup";
        const maxAge = Math.max(fresh.length, aging.length, atRisk.length, stale.length, 1);

        root.innerHTML = `
          <div class="declutter-shell h-screen max-h-[680px] overflow-hidden rounded-lg border border-white/10 bg-[#050a11] text-left shadow-2xl">
            <div class="flex items-center justify-between border-b border-white/10 px-5 py-4">
              <div class="flex items-center gap-3">
                <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-blue-600 text-white">${icon("brush", 22)}</div>
                <div>
                  <div class="text-xl font-bold leading-5 text-white">Declutter</div>
                  <div class="mt-1 text-xs text-slate-400">Stale Card Manager for Trello</div>
                </div>
              </div>
              <div class="flex items-center gap-3">
                <button id="refresh" class="flex items-center gap-2 rounded-md bg-transparent px-2 py-1 text-xs text-slate-300 hover:bg-white/5 hover:text-white">${icon("refresh", 15)} Refresh</button>
                <div class="h-6 w-px bg-white/10"></div>
                <button id="close" class="rounded-md bg-transparent p-1 text-slate-400 hover:bg-white/5 hover:text-white" aria-label="Close">${icon("x", 20)}</button>
              </div>
            </div>

            <div class="max-h-[615px] overflow-y-auto p-4 scrollbar-thin">
              <div class="space-y-3">
                <section class="rounded-lg border border-white/10 bg-[#0b1320] p-6">
                  <div class="health-grid grid grid-cols-[120px_minmax(0,1fr)_170px] items-center gap-6">
                    <div class="relative h-[104px] w-[104px]">
                      ${circle(health, healthColor)}
                      <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span class="text-4xl font-bold leading-none" style="color:${healthColor}">${health}</span>
                        <span class="text-sm text-slate-300">/100</span>
                      </div>
                    </div>
                    <div>
                      <h2 class="text-lg font-bold text-white">Board Health Score</h2>
                      <div class="mt-2 flex items-center gap-2 text-sm text-green-400">${healthLabel} ${icon("check", 15)}</div>
                      <div class="mt-7 text-xs text-slate-400">Last updated: 2 mins ago</div>
                    </div>
                    <div class="text-right">
                      <svg viewBox="0 0 150 70" class="h-20 w-full">
                        <defs><linearGradient id="sparkFill" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#22c55e66"></stop><stop offset="100%" stop-color="#22c55e00"></stop></linearGradient></defs>
                        <path d="M12 48 L38 35 L64 42 L90 24 L114 36 L138 14 L138 64 L12 64 Z" fill="url(#sparkFill)"></path>
                        <polyline points="12,48 38,35 64,42 90,24 114,36 138,14" fill="none" stroke="#22c55e" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></polyline>
                        <circle cx="12" cy="48" r="4" fill="#22c55e"></circle><circle cx="38" cy="35" r="4" fill="#22c55e"></circle><circle cx="64" cy="42" r="4" fill="#22c55e"></circle><circle cx="90" cy="24" r="4" fill="#22c55e"></circle><circle cx="114" cy="36" r="4" fill="#22c55e"></circle><circle cx="138" cy="14" r="4" fill="#22c55e"></circle>
                      </svg>
                      <div class="text-xs text-slate-300">Trend (7 days): <span class="text-green-400">up 6</span></div>
                    </div>
                  </div>
                </section>

                <div class="stats-grid grid grid-cols-3 gap-3">
                  ${statCard({ iconName: "circleAlert", label: "Stale Cards", count: stale.length, sub: "Need immediate action", color: "#ef4444" })}
                  ${statCard({ iconName: "alert", label: "At Risk Cards", count: atRisk.length, sub: "May become stale soon", color: "#f59e0b" })}
                  ${statCard({ iconName: "user", label: "Unassigned Cards", count: unassigned.length, sub: "No members assigned", color: "#a855f7" })}
                </div>

                <section class="rounded-lg border border-white/10 bg-[#0b1320] p-4">
                  <h2 class="mb-4 text-base font-bold text-white">Aging Distribution</h2>
                  <div class="aging-flex flex items-center gap-7">
                    <div class="flex-1 space-y-4">
                      ${ageBar("Fresh (0-7 days)", "#22c55e", fresh.length, maxAge)}
                      ${ageBar("Aging (8-20 days)", "#facc15", aging.length, maxAge)}
                      ${ageBar("At Risk (21-29 days)", "#f97316", atRisk.length, maxAge)}
                      ${ageBar("Stale (30+ days)", "#ef4444", stale.length, maxAge)}
                    </div>
                    ${donut(fresh.length, aging.length, atRisk.length, stale.length, cards.length)}
                  </div>
                </section>

                <section class="rules-grid grid grid-cols-[1fr_1.15fr_1fr] rounded-lg border border-white/10 bg-[#0b1320] p-4">
                  <div class="rule-section border-r border-white/10 pr-5">
                    <h2 class="text-base font-bold text-white">Sweep Rules</h2>
                    <label class="mt-4 block text-xs text-slate-300">Days before a card is considered stale</label>
                    <div class="mt-3 flex items-center gap-3"><input type="number" value="${threshold}" min="1" max="365" class="h-9 w-24 rounded-md border border-white/10 bg-[#07101b] px-3 text-sm text-white outline-none"><span class="text-sm text-slate-300">days</span></div>
                  </div>
                  <div class="rule-section border-r border-white/10 px-5">
                    <div class="mb-3 text-xs text-slate-300">When a card becomes stale</div>
                    <div class="space-y-2">
                      ${["Move to Stale List", "Archive Card", "Add Label", "Move to Another List"].map((label, i) => `<label class="flex cursor-pointer items-center gap-2 text-sm text-slate-200"><input type="radio" name="sweepAction" class="h-4 w-4 accent-blue-600" ${i === 0 ? "checked" : ""}>${label}</label>`).join("")}
                    </div>
                  </div>
                  <div class="rule-section pl-5">
                    <label class="flex cursor-pointer items-center gap-2 text-sm text-white"><input type="checkbox" checked class="h-4 w-4 accent-blue-600">Auto Sweep Enabled</label>
                    <p class="mt-2 text-xs leading-5 text-slate-400">Automatically apply the rule on schedule.</p>
                    <label class="mt-5 block text-xs text-slate-300">Sweep Frequency</label>
                    <select class="mt-2 h-9 w-full rounded-md border border-white/10 bg-[#07101b] px-3 text-sm text-white outline-none"><option>Daily</option><option>Weekly</option><option>Monthly</option></select>
                  </div>
                </section>

                <section class="rounded-lg border border-white/10 bg-[#0b1320] p-4">
                  <div class="mb-3 flex items-center justify-between">
                    <h2 class="text-base font-bold text-white">Weekly Cleanup Summary</h2>
                    <button class="flex items-center gap-2 rounded-md border border-blue-500/70 bg-transparent px-3 py-1.5 text-xs text-blue-400 hover:bg-blue-500/10">View Full Summary ${icon("arrow", 13)}</button>
                  </div>
                  <div class="summary-grid grid grid-cols-3">
                    <div class="summary-item flex flex-col items-center border-r border-white/10 px-4 text-center"><div class="flex items-center gap-2 text-green-500">${icon("check", 24)}<span class="text-2xl font-bold">8</span></div><div class="mt-1 text-sm text-white">Cards Swept</div><div class="text-xs text-slate-400">Automatically moved</div><button class="mt-2 flex items-center gap-1 bg-transparent p-0 text-xs font-medium text-green-500">View All ${icon("arrow", 13)}</button></div>
                    <div class="summary-item flex flex-col items-center border-r border-white/10 px-4 text-center"><div class="flex items-center gap-2 text-blue-500">${icon("rotate", 24)}<span class="text-2xl font-bold">3</span></div><div class="mt-1 text-sm text-white">Cards Revived</div><div class="text-xs text-slate-400">Stale cards made active again</div><button class="mt-2 flex items-center gap-1 bg-transparent p-0 text-xs font-medium text-blue-500">View All ${icon("arrow", 13)}</button></div>
                    <div class="summary-item flex flex-col items-center px-4 text-center"><div class="flex items-center gap-2 text-amber-500">${icon("clock", 24)}<span class="text-2xl font-bold">12</span></div><div class="mt-1 text-sm text-white">Became Stale</div><div class="text-xs text-slate-400">Newly crossed stale threshold</div><button class="mt-2 flex items-center gap-1 bg-transparent p-0 text-xs font-medium text-amber-500">View All ${icon("arrow", 13)}</button></div>
                  </div>
                </section>

                <button id="sweep" class="flex h-11 w-full items-center justify-center gap-3 rounded-md bg-blue-600 text-base font-bold text-white transition hover:bg-blue-500">${icon("brush", 18)}Sweep ${stale.length} Stale Card${stale.length === 1 ? "" : "s"}</button>
                <p class="-mt-1 flex items-center justify-center gap-2 text-xs text-slate-500">${icon("info", 14)} Stale cards will be processed based on the rule above.</p>

                <section class="rounded-lg border border-white/10 bg-[#0b1320] p-4">
                  <h2 class="mb-3 text-sm font-bold text-white">Quick Actions</h2>
                  <div class="quick-grid grid grid-cols-4 gap-3">
                    ${[
                      ["circleAlert", "View Stale Cards", `${stale.length} cards`, "#ef4444"],
                      ["alert", "View At Risk Cards", `${atRisk.length} cards`, "#f59e0b"],
                      ["user", "View Unassigned Cards", `${unassigned.length} cards`, "#a855f7"],
                      ["chart", "View Cleanup Summary", "This week", "#3b82f6"],
                    ].map(([iconName, label, sub, color]) => `
                      <button class="flex min-h-12 items-center justify-between rounded-md border border-white/10 bg-[#111a28] px-3 text-left transition hover:border-white/20 hover:bg-[#162236]">
                        <span class="flex min-w-0 items-center gap-2"><span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full" style="background:${color}20;color:${color}">${icon(iconName, 15)}</span><span class="min-w-0"><span class="block truncate text-xs font-medium text-white">${label}</span><span class="block truncate text-[11px] text-slate-400">${sub}</span></span></span>${icon("arrow", 13, "shrink-0 text-slate-400")}
                      </button>`).join("")}
                  </div>
                </section>
              </div>
            </div>

            <div class="flex items-center justify-between border-t border-white/10 px-5 py-3 text-xs text-slate-400">
              <span class="flex items-center gap-2">${icon("spark", 14)} Powering cleaner, healthier boards</span>
              <button class="flex items-center gap-2 bg-transparent p-0 text-xs text-slate-400 hover:text-white">Need help? ${icon("help", 14)}</button>
            </div>
          </div>`;

        document.getElementById("close")?.addEventListener("click", () => {
          if (typeof t.closeModal === "function") t.closeModal();
          else t.closePopup();
        });
        document.getElementById("refresh")?.addEventListener("click", () => renderDashboard(root, token));
        document.getElementById("sweep")?.addEventListener("click", () => {
          alert(`Sweeping ${stale.length} stale cards...`);
        });
      }

      (async () => {
        const root = document.getElementById("root");
        let token;
        try {
          token = await getToken();
        } catch {}

        if (token) {
          renderDashboard(root, token);
        } else {
          renderSignIn(root, (newToken) => renderDashboard(root, newToken));
        }
      })();
    </script>
  </body>
</html>
